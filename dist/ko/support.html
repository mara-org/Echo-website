<!DOCTYPE html>
<html lang="ko" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지원 | Echo</title>
    <link rel="icon" type="image/png" href="/ko/logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    
    <nav class="cozy-nav">
        <div class="nav-container">
            <a href="/ko/" class="nav-brand">
                <img src="../logo.png" alt="Echo" class="nav-logo">
                <span class="brand-name">Echo</span>
            </a>
            <div class="nav-links">
                <a href="/ko/#about">우리의 이야기</a>
            </div>
            <a href="/ko/#join" class="btn-primary nav-btn">앱 다운로드</a>
        </div>
    </nav>

    <main class="legal-page">
        <div class="legal-container">
            <h1>지원</h1>
            <p class="lead">Echo에 도움이 필요하신가요? 저희가 도와드리겠습니다.</p>
            <div class="contact-box">
                <i class="fa-solid fa-envelope"></i>
                <p><strong>support@iammara.com 으로 이메일 보내기</strong></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-brand">Echo &copy; <span id="year"></span></div>
            <div class="footer-links">
                <a href="/ko/support">지원</a>
                <a href="/ko/privacy">개인정보 처리방침</a>
                <a href="/ko/privacy-choices">개인정보 보호 옵션</a>
                <a href="/ko/terms">이용 약관</a>
                <a href="/ko/accessibility">접근성</a>
                <a href="/ko/age-suitability">연령 등급</a>
            </div>
            
            <div class="lang-switcher">
                <i class="fa-solid fa-globe"></i>
                <select class="language-dropdown">
                    <option value="/" data-lang="en">English</option>
                    <option value="/ar/" data-lang="ar">العربية</option>
                    <option value="/es/" data-lang="es">Español</option>
                    <option value="/fr/" data-lang="fr">Français</option>
                    <option value="/ja/" data-lang="ja">日本語</option>
                    <option value="/pt-BR/" data-lang="pt-BR">Português</option>
                    <option value="/de/" data-lang="de">Deutsch</option>
                    <option value="/it/" data-lang="it">Italiano</option>
                    <option value="/zh-Hans/" data-lang="zh-Hans">简体中文</option>
                    <option value="/" data-lang="ko" selected>한국어</option>
                </select>
            </div>

            <div class="footer-legal">
                <p>Mara liltaqniyat alhadithah alraqimiah Company | شركة مرا للتقنيات الحديثة الرقمية</p>
                <p>Saudi Business Center &bull; D-U-N-S: 986467776</p>
                <a href="https://www.google.com/maps/place/.../" target="_blank">Ad Diriyah 13714, 사우디아라비아</a>
            </div>
        </div>
    </footer>
    <script src="../script.js" defer></script>
</body>
</html>
